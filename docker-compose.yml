services:
  sentiment-ai:
    image: sentiment-ai:latest
    container_name: sentiment-staging
    ports:
      - "8001:8000"
    environment:
      - ENV=development
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s